spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:identity-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop

  rabbitmq:
    listener:
      simple:
        auto-startup: false
      direct:
        auto-startup: false

  cloud:
    aws:
      credentials:
        access-key: test-access-key
        secret-key: test-secret-key

logging:
  level:
    org.springframework.security: WARN
