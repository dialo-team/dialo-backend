spring:
  application:
    name: identity

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT}
      database: 0

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST}
    port: ${SPRING_RABBITMQ_PORT}
    username: ${SPRING_RABBITMQ_USERNAME}
    password: ${SPRING_RABBITMQ_PASSWORD}

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  cloud:
    aws:
      region:
        static: ap-southeast-1
      credentials:
        access-key: ${ACCESS_KEY}
        secret-key: ${SECRET_KEY}
      sns:
        enabled: true
        endpoint: arn:aws:sns:ap-southeast-1:093235337879:dialo-topic
        region: ap-southeast-1
esms:
  api-key: 90E2791E666EB86A2596BFF67186BE
  secret-key: 7579BF01D4E0834285135F4F514AF5
  brandname: Baotrixemay
  callback-url: https://esms.vn/webhook/

logging:
  level:
    org.springframework.security: DEBUG

security:
  jwt:
    private-key: classpath:certs/private.pem
    public-key: classpath:certs/public.pem

app:
  security:
    jwt:
      access-token-expiration: 86400000
      refresh-token-expiration: 604800000
    disposable-email: 10minutemail,20minutemail,33mail,5ymail,anonbox,guerrillamail,mailinator,maildrop,mailnesia,moakt,my10minutemail,throwawaymail,trashmail,temp-mail,tempmail,truemail,yopmail

server:
  port: ${SERVER_PORT:8082}