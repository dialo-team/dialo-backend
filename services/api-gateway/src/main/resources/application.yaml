spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: ms_iam_service
              uri: http://14.225.254.174:8082
              predicates:
                - Path=/api/v1/auth/**, /api/v1/accounts
            - id: ms_chat_service
              uri: http://14.225.254.174:8085
              predicates:
                - Path=/api/v1/conversations/**, /api/v1/messages/**, /uploads/**
            - id: ms_social_service
              uri: http://14.225.254.174:8084
              predicates:
                - Path=/api/v1/users/**, /api/v1/me/**

server:
  port: 9000


security:
  jwt:
    public-key: classpath:certs/public.pem